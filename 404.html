<style>
  .error-page {
    min-height: calc(100vh - 100px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 0;
  }

  .error-content {
    text-align: center;
    max-width: 600px;
    margin: 0 auto;
  }

  .error-illustration {
    max-width: 360px;
    margin: 0 auto 40px;
  }

  .error-illustration img {
    width: 100%;
    height: auto;
    opacity: 0.9;
  }

  .error-code {
    font-family: 'Noto Serif', serif;
    font-size: 5rem;
    font-weight: 700;
    color: var(--primary);
    line-height: 1;
    margin-bottom: 8px;
  }

  .error-title {
    font-family: 'Noto Serif', serif;
    font-size: 1.75rem;
    font-weight: 600;
    color: var(--on-surface);
    margin-bottom: 16px;
  }

  .error-message {
    font-size: 1.05rem;
    color: var(--on-surface-var);
    line-height: 1.7;
    margin-bottom: 36px;
  }

  .error-actions {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .error-btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 32px;
    background: var(--primary);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    border-radius: 10px;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s;
  }

  .error-btn-primary:hover {
    background: var(--primary-light);
    transform: translateY(-1px);
  }

  .error-btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 32px;
    background: transparent;
    color: var(--primary);
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    border: 2px solid var(--outline-var);
    border-radius: 10px;
    text-decoration: none;
    transition: border-color 0.2s, transform 0.15s;
  }

  .error-btn-secondary:hover {
    border-color: var(--primary);
    transform: translateY(-1px);
  }

  @media (max-width: 600px) {
    .error-code { font-size: 3.5rem; }
    .error-title { font-size: 1.35rem; }
    .error-illustration { max-width: 260px; margin-bottom: 28px; }
    .error-page { padding: 48px 0; }
    .error-actions { flex-direction: column; align-items: center; }
  }
</style>
</head>
<body>

  <kp-nav></kp-nav>

  <section class="error-page">
    <div class="container">
      <div class="error-content">
        <div class="error-illustration">
          <img src="/img/404-knight.png" alt="A fallen knight's helmet, cracked and resting on the ground" />
        </div>
        <div class="error-code">404</div>
        <h1 class="error-title">This Knight Has Fallen</h1>
        <p class="error-message">The page you're looking for has been moved, removed, or never existed. Even the bravest knights lose their way sometimes.</p>
        <div class="error-actions">
          <a href="/index.html" class="error-btn-primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Back to Home
          </a>
          <a href="/contact.html" class="error-btn-secondary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            Contact Us
          </a>
        </div>
      </div>
    </div>
  </section>

  <kp-footer tagline="Personalized support. Meaningful learning. Real-world preparation."></kp-footer>

  <script src="/js/components.js"></script>
</body>
</html>
